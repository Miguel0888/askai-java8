name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.0'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Java 8 AskAI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6.4'

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "TAG=v${VERSION}" >> "${GITHUB_ENV}"

      - name: Build Java 8 fat jar
        run: gradle --no-daemon clean :askai-app:fatJar -PreleaseVersion="${VERSION}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: askai-java8-${{ env.VERSION }}
          path: askai-app/build/libs/askai-java8-${{ env.VERSION }}.jar
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: AskAI Java 8 ${{ env.TAG }}
          generate_release_notes: true
          files: askai-app/build/libs/askai-java8-${{ env.VERSION }}.jar
          fail_on_unmatched_files: true
